<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started | NEXUS</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="main.css">
  
</head>
<body>
<nav class="navbar navbar-expand-lg fixed-top glass-nav py-3 navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold text-white fs-3" href="index.html">NEXUS<span class="text-primary">.</span></a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light border-secondary px-4">Exit</a>
            </div>
        </div>
    </nav>

    <section class="contact-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="text-center mb-5">
                        <span class="badge-modern mb-3 d-inline-block">Inquiry</span>
                        <h1 class="display-3 fw-bold">Let's build <span class="text-primary">together.</span></h1>
                        <p class="text-secondary lead">Tell us about your project and we'll get back to you within 24 hours.</p>
                    </div>

                    <div class="bento-card p-4 p-md-5">
                        <form action="" method="POST" id="contactForm">
                            <div class="mb-5">
                                <label class="form-label d-block mb-4">What do you need help with?</label>
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <input type="radio" name="projectType" id="typeWeb" class="project-type-input" checked>
                                        <label for="typeWeb" class="project-type-card d-block">
                                            <i class="bi bi-code-slash fs-2 mb-2 d-block text-primary"></i>
                                            <span>Web Dev</span>
                                        </label>
                                    </div>
                                    <div class="col-md-4">
                                        <input type="radio" name="projectType" id="typeGeo" class="project-type-input">
                                        <label for="typeGeo" class="project-type-card d-block">
                                            <i class="bi bi-geo-alt fs-2 mb-2 d-block text-info"></i>
                                            <span>Geology</span>
                                        </label>
                                    </div>
                                    <div class="col-md-4">
                                        <input type="radio" name="projectType" id="typeDesign" class="project-type-input">
                                        <label for="typeDesign" class="project-type-card d-block">
                                            <i class="bi bi-palette fs-2 mb-2 d-block text-warning"></i>
                                            <span>Design</span>
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-control" placeholder="John Doe" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" class="form-control" placeholder="john@example.com" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Project Details</label>
                                    <textarea class="form-control" rows="5" placeholder="Tell us about your vision, goals, and any specific requirements..."></textarea>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Estimated Budget</label>
                                    <select class="form-select">
                                        <option selected>Select a range</option>
                                        <option value="1">$500 - $1,000</option>
                                        <option value="2">$1,000 - $5,000</option>
                                        <option value="3">$5,000+</option>
                                    </select>
                                </div>
                                <div class="col-md-6 d-flex align-items-end">
                                    <button type="submit" class="btn btn-primary btn-lg w-100 py-3 mt-4 mt-md-0">
                                        Send Inquiry <i class="bi bi-send ms-2"></i>
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
